<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Library Trail</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --accent: #2563eb;
      --good: #15803d;
      --bad: #b91c1c;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero, .card, .badge-card, .summary-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    .start-screen {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 16px;
    }

    .start-screen h1 {
      margin: 0;
      font-size: 2.4rem;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 24px;
      display: grid;
      gap: 20px;
    }

    .main-content {
      display: grid;
      gap: 20px;
    }

    .card {
      padding: 20px;
    }

    .progress-row,
    .progress-column {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .progress-step {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #f8fbff;
      min-height: 82px;
    }

    .progress-step.done {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }

    .step-title {
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .step-status {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .game-area {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .question-block {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      margin-bottom: 12px;
      background: #fafcff;
    }

    .question-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .option-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    button, .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    button:hover, .btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-success {
      background: var(--good);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .answer-btn {
      text-align: left;
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 12px 14px;
      border-radius: 12px;
    }

    .answer-btn.selected {
      border-color: var(--accent);
      background: #eff6ff;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-size: 1rem;
      margin-top: 8px;
    }

    .crossword-grid {
      display: inline-grid;
      grid-template-columns: repeat(5, 54px);
      gap: 6px;
      margin: 12px 0 16px;
    }

    .crossword-cell {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      border: 1px solid var(--line);
      text-align: center;
      font-size: 1.15rem;
      text-transform: uppercase;
      font-weight: bold;
    }

    .crossword-cell.blocked {
      background: #cbd5e1;
      border-color: #cbd5e1;
    }

    .clue-list {
      display: grid;
      gap: 8px;
      color: var(--muted);
      line-height: 1.45;
    }

    .image-stage {
      position: relative;
      display: inline-block;
      max-width: 100%;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #e2e8f0;
    }

    .image-stage img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .spot-marker {
      position: absolute;
      width: 26px;
      height: 26px;
      border: 3px solid #ef4444;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.75);
    }

    .hint-box {
      padding: 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      color: var(--muted);
      line-height: 1.5;
    }

    .badge-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .badge-card {
      padding: 18px;
      text-align: center;
      border: 2px solid transparent;
    }

    .badge-card button {
      width: 100%;
      margin-top: 12px;
    }

    .badge-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .badge-name {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .badge-copy {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .summary-card {
      padding: 20px;
    }

    .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      margin: 0 8px 8px 0;
    }

    .hidden { display: none !important; }

    .footer-note {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      margin-top: 20px;
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .summary-grid,
      .progress-row,
      .progress-column {
        grid-template-columns: 1fr;
      }

      .badge-grid {
        grid-template-columns: 1fr;
      }

      .crossword-grid {
        grid-template-columns: repeat(5, 46px);
      }

      .crossword-cell {
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section id="startScreen" class="hero start-screen">
      <h1>Interactive Library Trail</h1>
      <button onclick="enterTrail()">Enter</button>
    </section>

    <div id="trailApp" class="app-shell hidden">
      <aside class="sidebar">
        <section class="card">
          <h2>Trail Progress</h2>
          <p id="progressText">0 of 5 stations completed.</p>
          <div id="progressRow" class="progress-column"></div>
          <div class="btn-row">
            <button class="btn-secondary" id="resetProgressBtn">Reset Progress</button>
          </div>
        </section>

        <section class="card">
          <h2>Chosen Badges</h2>
          <div id="chosenBadges"></div>
        </section>
      </aside>

      <main class="main-content">
        <section id="gameArea" class="card game-area"></section>

        <section id="badgeChoiceArea" class="card hidden"></section>

        <section id="summaryArea" class="summary-grid hidden"></section>

        <p class="footer-note">
          Setup note: replace the sample questions, image, hotspot coordinates,
          video clue text, and badge names with your actual library trail content.
        </p>
      </main>
    </div>
  </div>

  <script>
    const trailData = {
      title: "Interactive Library Trail",
      stations: [
        {
          id: 1,
          type: "quiz",
          title: "Trivia",
          description: "Can you guess all 5 correctly?",
          badgeOptions: [
            { icon: "📚", name: "Cash", description: "It's what I am meant to do" },
            { icon: "🧠", name: "Contentment", description: "Passion is what keeps me going" }
          ],
          questions: [
            {
              prompt: "Where can you find music scores and music CDs?",
              options: ["Tampines Library", "Habourfront Library", "Central Library", "Central Arts Library"],
              answer: 3
            },
            {
              prompt: "What is the call number for Ba ma bu zai jia = Ilo Ilo [DVD]?",
              options: ["792.4372 ILO", "791.4372 ILO", "798.4 ILO", "791 ILO"],
              answer: 1
            },
            {
              prompt: "Which of these is not a performing arts digital resource?",
              options: ["The Economist Intelligence Unit", "medici.tv", "NAXOS music", "General Kanopy"],
              answer: 0
            },
            {
              prompt: "Which of the following is not a type of malay dance?",
              options: ["Joget", "Wayang Kulit", "Asli", "Masri"],
              answer: 1
            },
            {
              prompt: "Which one of the following isn’t a local playwright?",
              options: ["Kuo Pao Kun", "Alfian Sa'at", "Adriana Nordin Manan", "Jean Tay"],
              answer: 2
            }
          ]
        },
        {
          id: 2,
          type: "scramble",
          title: "Word Scramble",
          description: "Unscramble 3 words to collect your badge.",
          badgeOptions: [
            { icon: "🔤", name: "Credit Card", description: "I need it!" },
            { icon: "✏️", name: "Community", description: "I love giving back!" }
          ],
          questions: [
            { scrambled: "tayaraabhntam", answer: "bharatanatyam", clue: "A type of indian classical dance" },
            { scrambled: "prcepenati", answer: "apprentice", clue: "Title of a local film (2016)." },
            { scrambled: "91-6880", answer: "06-1988", clue: "When did Singapore Ballet first started?" }
          ]
        },
        {
          id: 3,
          type: "crossword",
          title: "Mini Crossword",
          description: "Fill in the mini crossword using the clues.",
          badgeOptions: [
            { icon: "🧩", name: "Condo", description: "I would love to have a pool and a gym." },
            { icon: "📝", name: "Convenience", description: "Anywhere is fine as long as I'm near a MRT" }
          ],
          crossword: {
            solution: [
              ["D", "A", "N", "C", "E"],
              ["", "C", "", "T", ""],
              ["M", "U", "S", "I", "C"],
              ["", "S", "", "N", ""],
              ["S", "T", "A", "G", "E"]
            ],
            blocked: [
              [false, false, false, false, false],
              [true, false, true, false, true],
              [false, false, false, false, false],
              [true, false, true, false, true],
              [false, false, false, false, false]
            ],
            clues: [
              "Across 1: An art form expressed through movement of the body.",
              "Across 2: What art form can be heard but not seen?",
              "Across 3: Where actors perform.",
              "Down 1: A person who performs on stage in plays. (ACTOR)",
              "Down 2: The creative use of voice and body to tell a story."
            ]
          }
        },
        {
          id: 4,
          type: "spot",
          title: "Spot-the-Difference",
          description: "Click the difference you noticed in the image shown on screen.",
          badgeOptions: [
            { icon: "👀", name: "Car", description: "It's all about the comfort and quality of life" },
            { icon: "🔎", name: "Choice", description: "Bus, trains, taxis, it's just point A to B" }
          ],
          image: {
            src: "images/spot-difference.jpg",
            alt: "Spot the difference image",
            instruction: "Click the area where you spotted the difference.",
            hotspot: { xPercent: 69, yPercent: 41, radiusPercent: 8 }
          }
        },
        {
          id: 5,
          type: "password",
          title: "Enter the Password",
          description: "Watch the real-life video, find the phrase, and enter it here. (red)",
          badgeOptions: [
            { icon: "🔐", name: "Country Club", description: "Let me play my pickleball in peace" },
            { icon: "🎬", name: "Choice", description: "I have to keep my options as open as possible" }
          ],
          instruction: "Participants watch a separate video in real life. When they find the hidden phrase, they enter it below.",
          acceptedAnswers: ["Red"]
        }
      ]
    };

    const storageKey = "library-trail-progress-v1";

    const defaultState = {
      completedStations: [],
      selectedStationId: 1,
      hasEntered: false,
      badges: {},
      quizAnswers: {},
      scrambleAnswers: {},
      quizProgress: {},
      scrambleProgress: {},
      crosswordInputs: {},
      spotMarker: null,
      passwordInput: "",
      pendingBadgeStationId: null
    };

    let state = loadState();

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        return saved ? { ...structuredClone(defaultState), ...saved } : structuredClone(defaultState);
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function structuredClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function isCompleted(stationId) {
      return state.completedStations.includes(stationId);
    }

    function isUnlocked(stationId) {
      return stationId === 1 || isCompleted(stationId - 1) || isCompleted(stationId);
    }

    function stationById(id) {
      return trailData.stations.find(s => s.id === id);
    }

    function enterTrail() {
      state.hasEntered = true;
      render();
    }

    function render() {
      const startScreen = document.getElementById("startScreen");
      const trailApp = document.getElementById("trailApp");

      if (state.hasEntered) {
        startScreen.classList.add("hidden");
        trailApp.classList.remove("hidden");
      } else {
        startScreen.classList.remove("hidden");
        trailApp.classList.add("hidden");
      }

      renderProgress();
      renderGameArea();
      renderChosenBadges();
      renderBadgeChoice();
      renderSummary();
      saveState();
    }

    function renderProgress() {
      const progressRow = document.getElementById("progressRow");
      const progressText = document.getElementById("progressText");
      progressText.textContent = `${state.completedStations.length} of ${trailData.stations.length} stations completed.`;

      progressRow.innerHTML = trailData.stations.map(station => {
        const classes = ["progress-step"];
        if (isCompleted(station.id)) classes.push("done");
        return `
          <div class="${classes.join(" ")}">
            <div class="step-title">${station.id}. ${station.title}</div>
            <div class="step-status">${isCompleted(station.id) ? "Completed" : isUnlocked(station.id) ? "Unlocked" : "Locked"}</div>
          </div>
        `;
      }).join("");
    }

    function renderGameArea() {
      const gameArea = document.getElementById("gameArea");
      const station = stationById(state.selectedStationId);

      if (!station) return;

      if (state.pendingBadgeStationId) {
        const pendingStation = stationById(state.pendingBadgeStationId);
        gameArea.innerHTML = `
          <div>
            <h2>Choose Your Badge First</h2>
            <p>You completed <strong>${pendingStation.title}</strong>. Pick your badge to unlock the next station.</p>
          </div>
        `;
        return;
      }

      if (!isUnlocked(station.id)) {
        gameArea.innerHTML = `<h2>${station.title}</h2><p>This station is locked. Complete the earlier station first.</p>`;
        return;
      }

      if (station.type === "quiz") renderQuiz(gameArea, station);
      if (station.type === "scramble") renderScramble(gameArea, station);
      if (station.type === "crossword") renderCrossword(gameArea, station);
      if (station.type === "spot") renderSpotDifference(gameArea, station);
      if (station.type === "password") renderPassword(gameArea, station);
    }

    function renderQuiz(container, station) {
      const currentIndex = state.quizProgress[station.id] || 0;
      const currentQuestion = station.questions[currentIndex];
      const selected = (state.quizAnswers[station.id] || {})[currentIndex];

      if (!currentQuestion) {
        completeStation(station.id);
        return;
      }

      container.innerHTML = `
        <div>
          <h2>${station.title}</h2>
          <p>${station.description}</p>
          <p>Question ${currentIndex + 1} of ${station.questions.length}</p>

          <div class="question-block">
            <div class="question-title">${currentQuestion.prompt}</div>
            <div class="option-list">
              ${currentQuestion.options.map((option, optIndex) => `
                <button class="answer-btn ${selected === optIndex ? "selected" : ""}" onclick="selectQuizAnswer(${station.id}, ${currentIndex}, ${optIndex})">
                  ${option}
                </button>
              `).join("")}
            </div>
          </div>

          <div class="btn-row">
            <button ${selected === undefined ? "disabled" : ""} onclick="submitQuiz(${station.id})">Submit Answer</button>
          </div>
        </div>
      `;
    }

    function selectQuizAnswer(stationId, questionIndex, optionIndex) {
      if (!state.quizAnswers[stationId]) state.quizAnswers[stationId] = {};
      state.quizAnswers[stationId][questionIndex] = optionIndex;
      render();
    }

    function submitQuiz(stationId) {
      const station = stationById(stationId);
      const currentIndex = state.quizProgress[stationId] || 0;
      const selected = (state.quizAnswers[stationId] || {})[currentIndex];
      const currentQuestion = station.questions[currentIndex];

      if (selected === currentQuestion.answer) {
        state.quizProgress[stationId] = currentIndex + 1;

        if (state.quizProgress[stationId] >= station.questions.length) {
          completeStation(stationId);
        } else {
          alert("Correct! Moving to the next question.");
          render();
        }
      } else {
        alert("Not correct yet. Try again.");
      }
    }

    function renderScramble(container, station) {
      const currentIndex = state.scrambleProgress[station.id] || 0;
      const currentQuestion = station.questions[currentIndex];
      const answers = state.scrambleAnswers[station.id] || {};

      if (!currentQuestion) {
        completeStation(station.id);
        return;
      }

      container.innerHTML = `
        <div>
          <h2>${station.title}</h2>
          <p>${station.description}</p>
          <p>Word ${currentIndex + 1} of ${station.questions.length}</p>

          <div class="question-block">
            <div class="question-title">${currentQuestion.scrambled}</div>
            <div class="hint-box">Clue: ${currentQuestion.clue}</div>
            <input
              type="text"
              value="${answers[currentIndex] || ""}"
              placeholder="Type your answer"
              oninput="updateScrambleAnswer(${station.id}, ${currentIndex}, this.value)"
            />
          </div>

          <div class="btn-row">
            <button onclick="submitScramble(${station.id})">Submit Answer</button>
          </div>
        </div>
      `;
    }

    function updateScrambleAnswer(stationId, index, value) {
      if (!state.scrambleAnswers[stationId]) state.scrambleAnswers[stationId] = {};
      state.scrambleAnswers[stationId][index] = value;
      saveState();
    }

    function submitScramble(stationId) {
      const station = stationById(stationId);
      const currentIndex = state.scrambleProgress[stationId] || 0;
      const currentQuestion = station.questions[currentIndex];
      const answers = state.scrambleAnswers[stationId] || {};
      const given = (answers[currentIndex] || "").trim().toUpperCase();

      if (given === currentQuestion.answer.toUpperCase()) {
        state.scrambleProgress[stationId] = currentIndex + 1;

        if (state.scrambleProgress[stationId] >= station.questions.length) {
          completeStation(stationId);
        } else {
          alert("Correct! Moving to the next word.");
          render();
        }
      } else {
        alert("Not correct yet. Try again.");
      }
    }

    function renderCrossword(container, station) {
      const { solution, blocked, clues } = station.crossword;
      const cells = [];

      for (let row = 0; row < solution.length; row++) {
        for (let col = 0; col < solution[row].length; col++) {
          const key = `${row}-${col}`;
          if (blocked[row][col]) {
            cells.push(`<div class="crossword-cell blocked"></div>`);
          } else {
            cells.push(`
              <input
                maxlength="1"
                class="crossword-cell"
                value="${state.crosswordInputs[key] || ""}"
                oninput="updateCrosswordCell('${key}', this.value)"
              />
            `);
          }
        }
      }

      container.innerHTML = `
        <div>
          <h2>${station.title}</h2>
          <p>${station.description}</p>
          <div class="crossword-grid">${cells.join("")}</div>
          <div class="clue-list">
            ${clues.map(clue => `<div>${clue}</div>`).join("")}
          </div>
          <div class="btn-row">
            <button onclick="submitCrossword(${station.id})">Submit Crossword</button>
          </div>
        </div>
      `;
    }

    function updateCrosswordCell(key, value) {
      state.crosswordInputs[key] = (value || "").slice(0, 1).toUpperCase();
      saveState();
    }

    function submitCrossword(stationId) {
      const station = stationById(stationId);
      const { solution, blocked } = station.crossword;

      for (let row = 0; row < solution.length; row++) {
        for (let col = 0; col < solution[row].length; col++) {
          if (blocked[row][col]) continue;
          const expected = solution[row][col].toUpperCase();
          const actual = (state.crosswordInputs[`${row}-${col}`] || "").toUpperCase();
          if (actual !== expected) {
            alert("Some crossword letters are incorrect or incomplete. Try again.");
            return;
          }
        }
      }

      completeStation(stationId);
    }

    function renderSpotDifference(container, station) {
      const marker = state.spotMarker;
      container.innerHTML = `
        <div>
          <h2>${station.title}</h2>
          <p>${station.description}</p>
          <div class="hint-box">${station.image.instruction}</div>
          <div class="image-stage" id="spotImageStage">
            <img src="${station.image.src}" alt="${station.image.alt}" id="spotImage" />
            ${marker ? `<div class="spot-marker" style="left:${marker.x}%; top:${marker.y}%"></div>` : ""}
          </div>
          <div class="btn-row">
            <button onclick="submitSpotDifference(${station.id})">Submit Selection</button>
            <button class="btn-secondary" onclick="clearSpotMarker()">Clear Selection</button>
          </div>
        </div>
      `;

      const stage = document.getElementById("spotImageStage");
      stage.addEventListener("click", handleSpotClick);
    }

    function handleSpotClick(event) {
      const stage = event.currentTarget;
      const rect = stage.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 100;
      const y = ((event.clientY - rect.top) / rect.height) * 100;
      state.spotMarker = { x: Number(x.toFixed(2)), y: Number(y.toFixed(2)) };
      render();
    }

    function clearSpotMarker() {
      state.spotMarker = null;
      render();
    }

    function submitSpotDifference(stationId) {
      const station = stationById(stationId);
      const guess = state.spotMarker;

      if (!guess) {
        alert("Please click on the image first.");
        return;
      }

      const { xPercent, yPercent, radiusPercent } = station.image.hotspot;
      const dx = guess.x - xPercent;
      const dy = guess.y - yPercent;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance > radiusPercent) {
        alert("That is not the correct difference yet. Try another area.");
        return;
      }

      completeStation(stationId);
    }

    function renderPassword(container, station) {
      container.innerHTML = `
        <div>
          <h2>${station.title}</h2>
          <p>${station.description}</p>
          <div class="hint-box">${station.instruction}</div>
          <div class="question-block">
            <div class="question-title">Enter the phrase from the video</div>
            <input type="text" value="${state.passwordInput || ""}" placeholder="Type the password or phrase" oninput="updatePasswordInput(this.value)" />
          </div>
          <div class="btn-row">
            <button onclick="submitPassword(${station.id})">Submit Password</button>
          </div>
        </div>
      `;
    }

    function updatePasswordInput(value) {
      state.passwordInput = value;
      saveState();
    }

    function submitPassword(stationId) {
      const station = stationById(stationId);
      const value = (state.passwordInput || "").trim();
      const matched = station.acceptedAnswers.some(answer => answer.toLowerCase() === value.toLowerCase());

      if (!matched) {
        alert("That password is incorrect. Try again.");
        return;
      }

      completeStation(stationId);
    }

    function completeStation(stationId) {
      if (!isCompleted(stationId)) {
        state.completedStations.push(stationId);
        state.completedStations.sort((a, b) => a - b);
      }

      state.pendingBadgeStationId = stationId;
      render();
    }

    function renderBadgeChoice() {
      const area = document.getElementById("badgeChoiceArea");
      const stationId = state.pendingBadgeStationId;

      if (!stationId || state.badges[stationId]) {
        area.classList.add("hidden");
        area.innerHTML = "";
        return;
      }

      const station = stationById(stationId);
      area.classList.remove("hidden");
      area.innerHTML = `
        <div>
          <h2>Choose Your Badge for ${station.title}</h2>
          <p>You completed this station. Pick <strong>1 out of 2</strong> badges to continue.</p>
          <div class="badge-grid">
            ${station.badgeOptions.map((badge, index) => `
              <div class="badge-card">
                <div class="badge-icon">${badge.icon}</div>
                <div class="badge-name">${badge.name}</div>
                <div class="badge-copy">${badge.description}</div>
                <button onclick="chooseBadge(${stationId}, ${index})">Choose This Badge</button>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function chooseBadge(stationId, badgeIndex) {
      const station = stationById(stationId);
      state.badges[stationId] = station.badgeOptions[badgeIndex];

      if (state.pendingBadgeStationId === stationId) {
        state.pendingBadgeStationId = null;
      }

      const nextStation = stationById(stationId + 1);
      if (nextStation) {
        state.selectedStationId = nextStation.id;
      }

      render();
    }

    function renderChosenBadges() {
      const container = document.getElementById("chosenBadges");
      const stationIds = Object.keys(state.badges);

      if (stationIds.length === 0) {
        container.innerHTML = `<p class="step-status">No badges chosen yet.</p>`;
        return;
      }

      container.innerHTML = stationIds.map(stationId => {
        const badge = state.badges[stationId];
        const station = stationById(Number(stationId));
        return `<div class="badge-pill">${badge.icon} <strong>${badge.name}</strong> <span>from ${station.title}</span></div>`;
      }).join("");
    }

    function renderSummary() {
      const area = document.getElementById("summaryArea");
      const finished = state.completedStations.length === trailData.stations.length;
      const allBadgesChosen = Object.keys(state.badges).length === trailData.stations.length;

      if (!finished) {
        area.classList.add("hidden");
        area.innerHTML = "";
        return;
      }

      area.classList.remove("hidden");
      area.innerHTML = `
        <div class="summary-card">
          <h2>Trail Completed</h2>
          <p>All 5 stations are done. ${allBadgesChosen ? "All badges have been chosen too." : "Choose the remaining badge selections to fully finish the trail."}</p>
          <div class="btn-row">
            <button class="btn-success" onclick="downloadSummary()">Download Completion Summary</button>
          </div>
        </div>
        <div class="summary-card">
          <h2>Completion Overview</h2>
          <p><strong>Stations completed:</strong> ${state.completedStations.length} / ${trailData.stations.length}</p>
          <p><strong>Badges chosen:</strong> ${Object.keys(state.badges).length} / ${trailData.stations.length}</p>
          <div>${Object.values(state.badges).map(badge => `<div class="badge-pill">${badge.icon} ${badge.name}</div>`).join("")}</div>
        </div>
      `;
    }

    function downloadSummary() {
      const lines = [];
      lines.push(`Trail: ${trailData.title}`);
      lines.push(`Completed stations: ${state.completedStations.join(", ")}`);
      lines.push(`Badges:`);

      trailData.stations.forEach(station => {
        const badge = state.badges[station.id];
        lines.push(`- Station ${station.id} (${station.title}): ${badge ? badge.name : "No badge selected"}`);
      });

      const blob = new Blob([lines.join("\n")], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "library-trail-summary.txt";
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("resetProgressBtn").addEventListener("click", () => {
      if (!confirm("Reset all trail progress and chosen badges?")) return;
      state = structuredClone(defaultState);
      render();
    });

    render();
  </script>
</body>
</html>
